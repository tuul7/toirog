<html>

<head>
    <title>Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0aa;

            /* FIX SCROLL */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 0;
        }

        /* Container */
        .container {
            width: 900px;
            min-height: 520px;
            /* fixed height устгасан */
            background: #fff;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
        }

        /* LEFT */
        .left {
            width: 50%;
            background: url("https://images.unsplash.com/photo-1516035069371-29a1b244cc32") no-repeat center/cover;
            color: white;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .left h2 {
            margin: 0;
        }

        .left .center-text {
            text-align: center;
            margin-top: 120px;
        }

        .left .bottom {
            text-align: center;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* RIGHT */
        .right {
            width: 50%;
            padding: 30px 40px;
            background: #f4f4f4;

            /* RIGHT PANEL SCROLL */
            max-height: 520px;
            overflow-y: auto;
        }

        .right h1 {
            margin: 0;
            color: #18a2a2;
        }

        .right p {
            margin-top: 0;
            font-size: 12px;
            letter-spacing: 2px;
        }

        /* Inputs */
        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Gender */
        .gender {
            display: flex;
            gap: 20px;
            margin: 8px 0;
        }

        /* Subscription */
        .subs {
            display: flex;
            gap: 15px;
            margin: 10px 0;
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .cancel {
            flex: 1;
            padding: 10px;
            background: #3b2e5a;
            color: white;
            border: none;
            cursor: pointer;
        }

        .confirm {
            flex: 1;
            padding: 10px;
            background: #1abc9c;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">

            <h2>Photography.</h2>

            <div class="center-text">
                <p>CLICK FOR YOUR SHOOT</p>
                <h1>Photography.</h1>
            </div>

            <div class="bottom">
                JOURNEY EVERYWHERE
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="right">

            <h1>Registration</h1>
            <p>CLICK FOR YOUR SHOOT</p>

            <!-- GET FORM -->
            <form action="lab2.html" method="get">

                <!-- Name -->
                <input type="text" name="name" placeholder="Name" required>

                <!-- Email -->
                <input type="email" name="email" placeholder="Email" required>

                <!-- Gender -->
                <label>Gender</label>
                <div class="gender">
                    <label>
                        <input type="radio" name="gender" value="Male"> Male
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Female"> Female
                    </label>
                </div>

                <!-- DOB -->
                <label>Date of Birth</label>
                <input type="date" name="dob">

                <!-- City -->
                <input type="text" name="city" placeholder="City">

                <!-- Country -->
                <select name="country">
                    <option value="">Select Country</option>
                    <option value="Mongolia">Mongolia</option>
                    <option value="Japan">Japan</option>
                    <option value="Korea">Korea</option>
                    <option value="USA">USA</option>
                </select>

                <!-- Subscription -->
                <label>Subscription</label>
                <div class="subs">
                    <label><input type="radio" name="sub" value="Bronze"> Bronze</label>
                    <label><input type="radio" name="sub" value="Silver"> Silver</label>
                    <label><input type="radio" name="sub" value="Gold"> Gold</label>
                </div>

                <!-- Buttons -->
                <div class="buttons">
                    <input type="reset" value="Cancel" class="cancel">
                    <input type="submit" value="Confirm" class="confirm">
                </div>

            </form>

        </div>

    </div>

</body>

</html>
