<html>

<head>
    <title>Дасгал ажил</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: black;
            margin: 8px;
        }

        .title {
            text-align: center;
            color: white;
        }

        .menu {
            width: 100%;
            background: #CBA0FF;
            display: flex;
            justify-content: center;
            gap: 100px;
            padding: 15px;
            box-sizing: border-box;
        }

        button {
            border: none;
            padding: 8px 40px;
            background: #cccccc;
            cursor: pointer;
        }

        button:hover {
            background: #80b4fc;
        }

        button:active {
            background: pink;
        }

        /* 1. MAIN LAYOUT - DESKTOP */
        .container {
            display: flex;
            width: 100%;
            padding: 20px;
            gap: 10px;
            box-sizing: border-box;
        }

        /* LEFT PROFILE */
        .profile {
            width: 25%;
            background: #F4C2C2;
            padding: 15px;
            box-sizing: border-box;
        }

        /* RIGHT SIDE */
        .right {
            width: 75%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .content {
            background: #FFFACD;
            padding: 10px;
            height: 450px;
        }

        .footer {
            background: #e69191;
            text-align: center;
            padding: 20px;
        }

        img {
            display: block;
            margin: auto;
            max-width: 100%;
            height: auto;
        }

        /* 2. LAPTOP & TABLET (Grid ашиглан Footer-ийг салгах) */
        @media screen and (max-width: 1024px) and (min-width: 601px) {
            .menu {
                gap: 20px;
            }

            .container {
                display: grid;
                /* Flex-ээс Grid рүү шилжинэ */
                grid-template-columns: 45% 1fr;
                /* Зүүн тал 45%, баруун тал үлдсэн зай */
                grid-template-areas:
                    "sidebar main"
                    "foot foot";
                /* Footer-ийг 2 багана дамнаж бүтэн гар гэж заана */
                gap: 15px;
            }

            .profile {
                width: 100%;
                /* Grid-ийн нэг нүдийг дүүргэнэ */
                grid-area: sidebar;
            }

            .right {
                width: 100%;
                display: contents;
                /* Grid доторх бүтцийг задлах */
            }

            .content {
                grid-area: main;
                /* Баруун талын нүдэнд орно */
            }

            .footer {
                grid-area: foot;
                /* Доор нь 2 багана дамнаж бүтэн гарна */
                margin-top: 5px;
            }
        }

        /* 3. MOBILE MODE */
        @media screen and (max-width: 600px) {
            .menu {
                gap: 10px;
                padding: 10px;
                flex-wrap: wrap;
            }

            .menu a button {
                width: 100%;
                padding: 8px;
            }

            .container {
                display: flex;
                flex-direction: column;
            }

            .profile,
            .right,
            .content,
            .footer {
                width: 100%;
            }

            .content {
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <h2 class="title"><i>ДАСГАЛ АЖИЛ:</i></h2>

    <div class="menu">
        <a href="home.html" target="content"><button type="button">Нүүр хуудас</button></a>
        <a href="picture.html" target="content"><button type="button">Зургууд</button></a>
        <a href="video.html" target="content"><button type="button">Бичлэг</button></a>
        <a href="map.html" target="content"><button type="button">Газрын зураг</button></a>
        <button type="button" disabled>Удахгүй</button>
    </div>

    <div class="container">
        <div class="profile">
            <img src="profile.jpg" width="250" height="250">
            <h3 style="text-align:center; color:purple;"><i>Хувийн мэдээлэл</i></h3>
            Нэр: М.Энхтуул <br> Нас: 18 <br> Мэргэжил: Програм хангамж 2+2 <br> Оюутны код: B25FM1208 <br><br>
            <a href="profile.jpg" target="_blank">
                <center>Зураг харах</center>
            </a>
        </div>

        <div class="right">
            <div class="content">
                <iframe name="content" width="100%" height="100%" frameborder="0"></iframe>
            </div>

            <div class="footer">
                Гэрийн хаяг: Улаанбаатар, БЗД, 14-р хороо, Мандах наран хотхон
            </div>
        </div>
    </div>

</body>

</html>
