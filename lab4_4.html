<html>

<head>
    <title>Lovebirds Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT SIDE */
        .left {
            width: 50%;
            background: #8fae9e;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .left img {
            width: 250px;
            margin-bottom: 20px;
        }

        .left h2 {
            margin: 10px 0 5px;
        }

        .dots {
            margin-top: 20px;
        }

        .dots span {
            height: 8px;
            width: 8px;
            background: white;
            display: inline-block;
            border-radius: 50%;
            margin: 0 3px;
            opacity: 0.4;
        }

        .dots span.active {
            opacity: 1;
        }

        /* RIGHT SIDE */
        .right {
            width: 50%;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            width: 300px;
        }

        .form-box h1 {
            font-family: cursive;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-box p {
            text-align: center;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-bottom: 1px solid #ccc;
            background: transparent;
        }

        .forgot {
            text-align: right;
            font-size: 12px;
            margin-top: -5px;
        }

        .forgot a {
            text-decoration: none;
            color: #777;
        }

        .signin-btn {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            border-radius: 20px;
            background: #555;
            color: white;
            cursor: pointer;
        }

        .or {
            text-align: center;
            margin: 20px 0;
            color: #aaa;
        }

        .google {
            text-align: center;
            font-size: 14px;
        }

        .google button {
            border: 1px solid #ccc;
            padding: 8px 15px;
            background: white;
            cursor: pointer;
            border-radius: 20px;
        }

        .create {
            text-align: center;
            font-size: 12px;
            margin-top: 20px;
        }

        .create a {
            text-decoration: none;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left">

            <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">

            <h2>Maecenas mattis egestas</h2>
            <p>Erdum et malesuada fames ac ante ipsum primis in faucibus suspendisse porta.</p>

            <div class="dots">
                <span></span>
                <span class="active"></span>
                <span></span>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="right">

            <div class="form-box">

                <h1>Lovebirds</h1>
                <p>Welcome to Lovebirds</p>

                <!-- GET FORM -->
                <form action="lab2.html" method="get">

                    <input type="text" name="username" placeholder="User name or Email" required>

                    <input type="password" name="password" placeholder="Password" required>

                    <div class="forgot">
                        <a href="#">Forgot password?</a>
                    </div>

                    <input type="submit" value="Sign in" class="signin-btn">

                </form>

                <div class="or">or</div>

                <div class="google">
                    <button>Sign in with Google</button>
                </div>

                <div class="create">
                    New Lovebirds?
                    <a href="#">Create Account</a>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
