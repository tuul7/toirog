<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title> Морин уралдаан</title>

    <style>
        /* HTML ба body-г бүтэн өндөртэй болгоно */
        html,
        body {
            height: 100%;
            margin: 0;
        }

        /* Ерөнхий background болон текст */
        body {
            min-height: 100vh;
            font-family: Arial;
            color: #fff;
            text-align: center;

            /* Gradient background */
            background: linear-gradient(to bottom,
                    #0f2027 0%,
                    #203a43 50%,
                    #2c5364 100%);
        }

        h2 {
            margin-top: 20px;
            font-size: 28px;
        }

        /* Товч */
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff9800, #ff5722);
            color: #fff;
            cursor: pointer;
        }

        /* Шагайн мэдээлэл */
        .dice {
            margin: 10px;
            font-size: 18px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Тоглоомын хэсэг */
        .container {
            position: relative;
            width: 800px;
            margin: 20px auto;
            height: 260px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
        }

        /* Зам */
        .track {
            margin: 40px 0;
            text-align: left;
        }

        /* Морь */
        .horse {
            position: relative;
            left: 0;
            font-size: 45px;
            transition: left 0.4s;
        }

        /* Бариа */
        .finish {
            position: absolute;
            right: 40px;
            top: 0;
            bottom: 0;
            width: 12px;
            background: repeating-linear-gradient(white 0px, white 10px,
                    black 10px, black 20px);
        }

        /* Ялагчийн popup */
        .winner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 30px;
            background: #000;
            padding: 20px 40px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .winner.show {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>

</head>

<body>

    <h2>Морин уралдаан</h2>

    <!-- Шагай шидэх товч -->
    <button id="rollBtn">Шагай орхих</button>

    <!-- Шагайн үр дүн -->
    <div id="dice1" class="dice">Тоглогч 1: -</div>
    <div id="dice2" class="dice">Тоглогч 2: -</div>

    <div class="container">

        <!-- Барианы шугам -->
        <div class="finish" id="finishLine"></div>

        <!-- Тоглогч 1 -->
        <div class="track">
            ТОГЛОГЧ 1
            <div id="horse1" class="horse">🐎</div>
        </div>

        <!-- Тоглогч 2 -->
        <div class="track">
            ТОГЛОГЧ 2
            <div id="horse2" class="horse">🐎</div>
        </div>

        <!-- Ялагчийн текст -->
        <div id="winnerText" class="winner"></div>

    </div>

    <script>

        /* DOM элементүүдийг авах */
        const rollBtn = document.getElementById("rollBtn");
        const horse1 = document.getElementById("horse1");
        const horse2 = document.getElementById("horse2");
        const dice1 = document.getElementById("dice1");
        const dice2 = document.getElementById("dice2");
        const winnerText = document.getElementById("winnerText");
        const finishLine = document.getElementById("finishLine");

        /* Морьны байрлал */
        let pos1 = 0;
        let pos2 = 0;

        /* Шагайн төрлүүд */
        const shagaiTypes = ["М", "Я", "Т", "Х"];

        /* 4 шагай шидэх функц */
        const roll4Shagai = () => {
            let results = [];
            let horseCount = 0;

            for (let i = 0; i < 4; i++) {
                const val = shagaiTypes[Math.floor(Math.random() * 4)];
                results.push(val);

                /* Морь гарвал тоолно */
                if (val === "М") {
                    horseCount++;
                }
            }

            return { results, horseCount };
        };

        /* Товч дарахад */
        rollBtn.addEventListener("click", () => {

            const p1 = roll4Shagai();
            const p2 = roll4Shagai();

            /* UI-д харуулах */
            dice1.textContent =
                "Тоглогч 1: " + p1.results.join(" ") +
                " | М=" + p1.horseCount;

            dice2.textContent =
                "Тоглогч 2: " + p2.results.join(" ") +
                " | М=" + p2.horseCount;

            /* 4 морь → шууд ялалт */
            if (p1.horseCount === 4) {
                showWinner("Тоглогч 1 шууд яллаа!");
                return;
            }

            if (p2.horseCount === 4) {
                showWinner("Тоглогч 2 шууд яллаа!");
                return;
            }

            /* Морьны тоогоор урагшлах */
            pos1 += p1.horseCount * 50;
            pos2 += p2.horseCount * 50;

            horse1.style.left = pos1 + "px";
            horse2.style.left = pos2 + "px";

            checkWinner();
        });

        /* Бариаг DOM-оос авах */
        const getFinish = () => finishLine.offsetLeft;

        /* Ялагч шалгах */
        const checkWinner = () => {
            const finish = getFinish();

            if (pos1 >= finish && pos2 >= finish) {
                showWinner("Тэнцлээ!");
                return;
            }

            if (pos1 >= finish) {
                showWinner("Тоглогч 1 яллаа!");
                return;
            }

            if (pos2 >= finish) {
                showWinner("Тоглогч 2 яллаа!");
                return;
            }
        };

        /* Ялагч харуулах */
        const showWinner = (text) => {
            winnerText.textContent = text;
            winnerText.classList.add("show");

            setTimeout(() => {
                resetGame();
            }, 2500);
        };

        /* Тоглоом reset */
        const resetGame = () => {
            pos1 = 0;
            pos2 = 0;
            horse1.style.left = "0px";
            horse2.style.left = "0px";
            winnerText.classList.remove("show");
            dice1.textContent = "Тоглогч 1: -";
            dice2.textContent = "Тоглогч 2: -";
        };

    </script>

</body>

</html>
